<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Buddy | Emergency Triage AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #f3f4f6; }
        body { font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; }
        
        .chat-bubble-user { background-color: #0d9488; color: white; align-self: flex-end; border-bottom-right-radius: 4px; border-bottom-left-radius: 16px; border-top-left-radius: 16px; border-top-right-radius: 16px; }
        .chat-bubble-bot { background-color: #FFFFFF; color: #1f2937; align-self: flex-start; border-bottom-right-radius: 16px; border-bottom-left-radius: 4px; border-top-left-radius: 16px; border-top-right-radius: 16px; border: 1px solid #e5e7eb; }
        
        .menu-button {
            background-color: #ffffff; border: 1.5px solid #0d9488; color: #0d9488;
            padding: 0.6rem 1.2rem; margin: 0.3rem; border-radius: 9999px;
            cursor: pointer; font-size: 0.85rem; font-weight: 600; transition: all 0.2s ease;
        }
        .menu-button:hover { background-color: #0d9488; color: #ffffff; transform: translateY(-1.5px); }

        .sos-btn {
            position: fixed; top: 1rem; right: 1rem; z-index: 50;
            width: 55px; height: 55px; border-radius: 50%;
            background: linear-gradient(135deg, #dc2626, #ef4444);
            color: white; border: none; cursor: pointer; font-weight: bold;
            box-shadow: 0 10px 20px rgba(220, 38, 38, 0.4);
            animation: pulse-sos 2s infinite;
            display: flex; align-items: center; justify-content: center;
        }
        @keyframes pulse-sos {
            0% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(220, 38, 38, 0); }
            100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); }
        }

        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(4px);
        }
        .modal.active { display: flex; }
        .modal-content {
            background: white; border-radius: 24px; padding: 2rem; width: 90%; max-width: 450px;
            max-height: 90vh; overflow-y: auto; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        
        #chat-area::-webkit-scrollbar { width: 4px; }
        #chat-area::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .triage-badge { padding: 2px 8px; border-radius: 4px; font-weight: bold; font-size: 0.7rem; text-transform: uppercase; }
        .triage-red { background: #fee2e2; color: #991b1b; }
        .triage-yellow { background: #fef9c3; color: #854d0e; }
        .triage-green { background: #dcfce7; color: #166534; }
    </style>
</head>
<body>

    </button>

    </div>

    <!-- SOS Modal -->
    <div id="sos-modal" class="modal">
        <div class="modal-content text-center">
            <h2 id="sos-title" class="text-3xl font-black text-red-600 mb-2">EMERGENCY</h2>
            <div id="sos-timer" class="text-5xl font-mono font-black mb-6 tracking-tighter text-gray-800">00:00</div>
            <p id="sos-status" class="mb-6 text-gray-500 font-medium">Initializing location tracking...</p>
            <div class="space-y-3">
                <button onclick="quickCall('108')" class="w-full bg-red-600 hover:bg-red-700 text-white p-4 rounded-xl font-bold flex items-center justify-center gap-2 shadow-lg transition-colors">
                    <span>📞</span> Call Ambulance (108)
                </button>
                <button onclick="sendEmergencySMS()" class="w-full bg-gray-800 hover:bg-black text-white p-4 rounded-xl font-bold flex items-center justify-center gap-2 transition-colors">
                    <span>💬</span> SMS Coordinates
                </button>
                <button onclick="closeSOSModal()" class="w-full bg-white text-gray-400 p-3 rounded-xl font-semibold border border-gray-200">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Profile Settings Modal -->
    <div id="settings-modal" class="modal">

                        <option value="hi">हिंदी (Hindi)</option>
                    </select>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase mb-1">Age</label>
                        <input type="number" id="p-age" placeholder="e.g. 35" class="w-full border-2 border-gray-100 p-3 rounded-xl bg-gray-50">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase mb-1">Blood Group</label>
                        <input type="text" id="p-blood" placeholder="O+" class="w-full border-2 border-gray-100 p-3 rounded-xl bg-gray-50">
                    </div>
                </div>
                <div class="flex items-center gap-3 p-3 bg-red-50 rounded-xl border border-red-100">

        // Rule-Based Emergency Index Logic
        function calculateEmergencyIndex(symptomKey, answers) {
            let severityScore = 0;
            const patientAge = profile.age || 30;
            const isChronic = profile.chronic;

            const baseWeights = {
                'chest pain': 10,
                'stiffness': 10, // Neck stiffness (Meningitis)
                'appendix': 9,  // Appendicitis
                'breath': 9,    // Breathing difficulty
                'high_fever': 7,
                'confusion': 10,
                'severe_joint': 5,
                'rash_severe': 6,
                'nausea': 4,
                'diarrhea': 3,
                'cough_blood': 10
            };

            for(let key in answers) {
                if(answers[key] && baseWeights[key]) {
                    severityScore += baseWeights[key];
                }
            }

            if (patientAge < 5 || patientAge > 65) severityScore += 5;
            else if (patientAge > 50) severityScore += 2;

            if (isChronic) severityScore += 6;

            if (severityScore >= 12) return { level: 'EMERGENCY', color: 'triage-red' };
            if (severityScore >= 7) return { level: 'HIGH', color: 'triage-yellow' };
            return { level: 'STABLE', color: 'triage-green' };
        }

        async function apiCall(prompt, retries = 5) {
            const systemPrompt = "You are Health Buddy, a professional health and triage assistant. Provide concise, medically accurate, and safe advice. Always include a disclaimer for non-emergency issues.";
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            contents: [{ parts: [{ text: prompt }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] }
                        })
                    });
                    if (!response.ok) throw new Error('API Error');
                    const data = await response.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text || "No response.";
                } catch (e) {
                    if (i === retries - 1) throw e;
                    await new Promise(r => setTimeout(r, Math.pow(2, i) * 1000));
                }
            }
        }

        function askFollowUp() {
            const t = i18n[currentLang];

            addMsg(qPrefix + qObj.q, 'bot');
            showButtons([t.btnYes, t.btnNo], (ans) => {
                collectedAnswers[qObj.key] = (ans === t.btnYes);
                followUpIndex++;
                if (followUpIndex < currentSymptomData.questions.length) {
                    askFollowUp();
                } else {
                    const result = currentSymptomData.diagnose(collectedAnswers);
                    addMsg(`🩺 <b>${t.assessmentTitle}:</b><br>${result.text}`, 'bot', result.triage);
                    addMsg(t.disclaimer, 'bot');
                    setTimeout(showMenu, 8000);
                }
            });
        }

            const t = i18n[currentLang];
            const idx = t.menuOptions.indexOf(choice);

            else if (idx === 2) { flowState = 'free_ask'; addMsg(t.promptAsk, 'bot'); }

                flowState = 'self_care'; 
                addMsg(t.promptSelfCare, 'bot'); 
                showButtons(t.selfCareOptions, (sel) => {

            else if (idx === 4) { 
                flowState = 'pincode'; 
                addMsg(t.promptPincode, 'bot');

                    const url = `https://www.google.com/maps/search/hospitals+near+${lat},${lng}/`;
                    addMsg(`<a href="${url}" target="_blank" class="text-teal-600 font-bold underline">${currentLang === 'hi' ? 'अस्पताल खोजने के लिए यहाँ क्लिक करें' : 'Click here to find hospitals'}</a>`, 'bot');

                (p) => {
                    document.getElementById('sos-status').innerHTML = `📍 Location: ${p.coords.latitude.toFixed(4)}, ${p.coords.longitude.toFixed(4)}`;
                },
                () => {
                    document.getElementById('sos-status').innerText = t.sosError;
                },
                { timeout: 12000, enableHighAccuracy: true }
            );
        }
        function closeSOSModal() { document.getElementById('sos-modal').classList.remove('active'); }
        function updateTimer() {
            if (!document.getElementById('sos-modal').classList.contains('active')) return;
            const s = Math.floor((Date.now() - sosStartTime)/1000);
            document.getElementById('sos-timer').innerText = `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`;
            setTimeout(updateTimer, 1000);
        }

        function quickCall(n) { window.location.href = `tel:${n}`; }
        function sendEmergencySMS() {
            const loc = document.getElementById('sos-status').innerText;
            const msg = `🆘 SOS! I need help. ${loc}. Name: ${userName}. Age: ${profile.age}. Chronic: ${profile.chronic}.`;
            window.location.href = `sms:?body=${encodeURIComponent(msg)}`;
        }

        function startVoice() {
            const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
            if(!SpeechRec) return;
            const rec = new SpeechRec();
            rec.lang = currentLang === 'hi' ? 'hi-IN' : 'en-US';
            rec.onresult = (e) => { userInput.value = e.results[0][0].transcript; sendMessage(); };
            rec.start();
        }

        function sendMessage() {
            const v = userInput.value.trim();
            if (!v) return;
            addMsg(v, 'user');
            userInput.value = '';
            processInput(v);
        }

        function changeLanguage(l) {
            currentLang = l;
            const t = i18n[l];
            document.getElementById('header-subtitle').innerText = t.headerSubtitle;
            document.getElementById('settings-title').innerText = t.settingsTitle;
            document.getElementById('btn-save-settings').innerText = t.btnSave;
            userInput.placeholder = l === 'en' ? "Describe symptoms..." : "लक्षणों का वर्णन करें...";
            if (flowState === 'menu') showMenu();
        }

        window.onload = () => {
            addMsg("Select Language / भाषा चुनें:", 'bot');
            showButtons(['English', 'हिंदी'], (c) => {
                currentLang = (c === 'English' ? 'en' : 'hi');
                changeLanguage(currentLang);
                flowState = 'naming';
                addMsg(i18n[currentLang].askName, 'bot');
            });
        };

        userInput.addEventListener("keypress", (e) => { if(e.key === "Enter") sendMessage(); });
    </script>
</body>
</html>
