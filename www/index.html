<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Buddy | Professional Emergency Triage AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /**
         * GLOBAL UI THEME & RESET
         * Using Inter font-family for high legibility.
         * Custom CSS variables for brand consistency.
         */
        :root {
            --primary-teal: #0d9488;
            --primary-dark: #0f766e;
            --bg-slate: #f0f2f5;
            --text-dark: #1e293b;
            --error-red: #dc2626;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg-slate); color: var(--text-dark); }
        body { font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; }
        
        /**
         * CHAT BUBBLE STYLES
         * Responsive bubbles with gradient backgrounds for the user.
         * Clean, bordered bubbles for the AI assistant.
         */
        .chat-bubble-user { 
            background: linear-gradient(135deg, var(--primary-teal), var(--primary-dark)); 
            color: white; 
            align-self: flex-end; 
            border-bottom-right-radius: 4px; 
            border-bottom-left-radius: 18px; 
            border-top-left-radius: 18px; 
            border-top-right-radius: 18px; 
            box-shadow: 0 4px 12px rgba(13, 148, 136, 0.2);
        }
        .chat-bubble-bot { 
            background-color: #ffffff; 
            color: var(--text-dark); 
            align-self: flex-start; 
            border-bottom-right-radius: 18px; 
            border-bottom-left-radius: 4px; 
            border-top-left-radius: 18px; 
            border-top-right-radius: 18px; 
            border: 1px solid #e2e8f0; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }
        
        /**
         * INTERACTIVE UI ELEMENTS
         */
        .menu-button {
            background-color: #ffffff; border: 1.5px solid var(--primary-teal); color: var(--primary-teal);
            padding: 0.7rem 1.4rem; margin: 0.35rem; border-radius: 9999px;
            cursor: pointer; font-size: 0.875rem; font-weight: 600; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex; align-items: center; gap: 0.5rem;
        }
        .menu-button:hover { background-color: var(--primary-teal); color: #ffffff; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(13, 148, 136, 0.25); }
        .menu-button:active { transform: scale(0.95); }

        .sos-btn {
            position: fixed; top: 1.25rem; right: 1.25rem; z-index: 50;
            width: 60px; height: 60px; border-radius: 50%;
            background: linear-gradient(135deg, var(--error-red), #991b1b);
            color: white; border: none; cursor: pointer; font-weight: 800;
            box-shadow: 0 10px 25px rgba(220, 38, 38, 0.5);
            animation: pulse-sos 2s infinite;
            display: flex; align-items: center; justify-content: center;
        }
        @keyframes pulse-sos {
            0% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.7); transform: scale(1); }
            70% { box-shadow: 0 0 0 18px rgba(220, 38, 38, 0); transform: scale(1.05); }
            100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); transform: scale(1); }
        }

        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.8); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(8px);
            padding: 1rem;
        }
        .modal.active { display: flex; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .modal-content {
            background: white; border-radius: 28px; padding: 2.5rem; width: 100%; max-width: 480px;
            max-height: 90vh; overflow-y: auto; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
        }
        
        #chat-area::-webkit-scrollbar { width: 5px; }
        #chat-area::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .triage-badge { padding: 4px 10px; border-radius: 6px; font-weight: 800; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; display: inline-block; }
        .triage-red { background: #fee2e2; color: #b91c1c; border: 1px solid #f87171; }
        .triage-yellow { background: #fef9c3; color: #a16207; border: 1px solid #facc15; }
        .triage-green { background: #dcfce7; color: #15803d; border: 1px solid #4ade80; }

        .assessment-card {
            border-left: 4px solid var(--primary-teal);
            padding-left: 1rem;
            margin: 0.5rem 0;
            background: #fdfdfd;
            padding-top: 0.5rem;
            padding-bottom: 0.5rem;
            border-radius: 0 8px 8px 0;
        }

        .reminder-card {
            background: #f1f5f9;
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 0.75rem;
            border-left: 4px solid var(--primary-teal);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .notification-toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            z-index: 2000;
            display: none;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp { from { bottom: 50px; opacity: 0; } to { bottom: 100px; opacity: 1; } }
    </style>
</head>
<body>

    <div id="notification-area" class="notification-toast"></div>

    <button onclick="openSOSModal()" class="sos-btn">SOS</button>

    </button>

        <header style="background: var(--primary-teal); color: white; padding: 1.5rem 1.5rem; display: flex; align-items: center; gap: 1.25rem; border-bottom: 1px solid rgba(255,255,255,0.1);">

            <div>
                <h1 style="font-size: 1.4rem; font-weight: 800; letter-spacing: -0.03em;">Health Buddy</h1>
                <p id="header-subtitle" style="font-size: 0.85rem; opacity: 0.85; font-weight: 500;">Intelligent Emergency Triage</p>
            </div>
        </header>

        <main id="chat-area" style="flex: 1; padding: 1.5rem; overflow-y: auto; display: flex; flex-direction: column; gap: 1.25rem; background: #f8fafc;"></main>

        <footer style="padding: 1.25rem; background: white; border-top: 1px solid #f1f5f9; display: flex; align-items: center; gap: 0.75rem;">

            </button>
            <input type="text" id="user-input" style="flex: 1; background: #f1f5f9; border-radius: 14px; padding: 0.9rem 1.25rem; border: 1.5px solid transparent; outline: none; font-size: 0.95rem; font-weight: 500; transition: all 0.2s;" placeholder="Type symptoms or ask a question...">
            <button onclick="sendMessage()" style="background: var(--primary-teal); color: white; width: 48px; height: 48px; border-radius: 14px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; box-shadow: 0 4px 12px rgba(13, 148, 136, 0.3);">

        </footer>
    </div>

    <!-- SOS Modal -->
    <div id="sos-modal" class="modal">
        <div class="modal-content text-center">
            <h2 id="sos-title" class="text-3xl font-black text-red-600 mb-2">EMERGENCY</h2>
            <div id="sos-timer" class="text-6xl font-mono font-black mb-6 tracking-tighter text-slate-800">00:00</div>
            <div id="sos-status" class="mb-8 p-4 bg-slate-50 rounded-2xl text-slate-500 font-semibold border border-slate-100">Initializing GPS...</div>
            <div class="space-y-4">
                <button onclick="quickCall('108')" class="w-full bg-red-600 hover:bg-red-700 text-white p-5 rounded-2xl font-black text-lg flex items-center justify-center gap-3 shadow-xl transform active:scale-95 transition-all">
                    <span>🚑</span> Call Ambulance (108)
                </button>
                <button onclick="sendEmergencySMS()" class="w-full bg-slate-900 hover:bg-black text-white p-5 rounded-2xl font-bold flex items-center justify-center gap-3 transform active:scale-95 transition-all">

            </div>
        </div>
    </div>

    <!-- Patient Profile Settings Modal -->
    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <h2 id="settings-title" class="text-2xl font-extrabold text-teal-900 mb-8 flex items-center gap-3">
                <span class="bg-teal-100 p-2 rounded-lg text-teal-600">👤</span> Patient Profile
            </h2>
            <div class="space-y-5">
                <div>
                    <label class="block text-[11px] font-black text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Language Preferences</label>
                    <select id="lang-switch" class="w-full border-2 border-slate-100 p-3.5 rounded-2xl bg-slate-50 focus:border-teal-500 focus:bg-white outline-none transition-all font-semibold" onchange="changeLanguage(this.value)">
                        <option value="en">English (US)</option>
                        <option value="hi">हिंदी (Hindi)</option>
                    </select>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[11px] font-black text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Age</label>
                        <input type="number" id="p-age" placeholder="35" class="w-full border-2 border-slate-100 p-3.5 rounded-2xl bg-slate-50 focus:border-teal-500 focus:bg-white outline-none font-semibold">
                    </div>
                    <div>
                        <label class="block text-[11px] font-black text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Blood Type</label>
                        <input type="text" id="p-blood" placeholder="O+" class="w-full border-2 border-slate-100 p-3.5 rounded-2xl bg-slate-50 focus:border-teal-500 focus:bg-white outline-none font-semibold uppercase">
                    </div>
                </div>
                <div class="flex items-center gap-4 p-4 bg-teal-50 rounded-2xl border-2 border-teal-100/50">
                    <input type="checkbox" id="p-chronic" class="w-6 h-6 rounded-lg text-teal-600 focus:ring-teal-500 border-slate-300">

                </div>
                <div>
                    <label class="block text-[11px] font-black text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Critical Allergies</label>
                    <textarea id="p-allergies" placeholder="e.g., Penicillin, Peanuts" class="w-full border-2 border-slate-100 p-4 rounded-2xl bg-slate-50 focus:border-teal-500 focus:bg-white outline-none font-semibold h-24 resize-none"></textarea>
                </div>
                <div class="pt-4 flex flex-col gap-3">
                    <button id="btn-save-settings" onclick="saveProfile()" class="w-full bg-teal-600 hover:bg-teal-700 text-white p-4 rounded-2xl font-black shadow-lg shadow-teal-200 transition-all transform active:scale-95">Save Profile</button>
                    <button onclick="closeSettingsModal()" class="w-full text-slate-400 font-bold py-2">Close</button>
                </div>
            </div>
        </div>
    </div>

        /**
         * EMERGENCY INDEX CALCULATION
         * Evaluates cumulative risk based on symptoms, age, and chronic history.
         */
        function calculateEmergencyIndex(symptomKey, answers) {
            let score = 0;
            const patientAge = profile.age || 30;
            const isChronic = profile.chronic;

            const baseWeights = { 
                'high_fever': 7, 'stiffness': 10, 'rash_severe': 9,
                'cardiac': 10, 'sweating': 8, 'crushing': 10,
                'appendix': 9, 'severe': 9, 'rigid': 10,
                'stroke': 10, 'stroke_fac': 10, 'fainting': 9,
                'drainage': 8, 'hearing': 7, 'anaphylaxis': 12, 'blood': 8
            };

            for(let key in answers) if(answers[key] && baseWeights[key]) score += baseWeights[key];
            if (patientAge < 5 || patientAge > 65) score += 5;
            if (isChronic) score += 6;

            if (score >= 12) return { level: 'EMERGENCY', color: 'triage-red' };
            if (score >= 7) return { level: 'HIGH', color: 'triage-yellow' };
            return { level: 'STABLE', color: 'triage-green' };
        }

                ["1. Condition: ", "2. Precaution: ", "3. Medication: ", "4. Doctor Necessity: "];
            return {
                triage: triage,
                text: `<div class="assessment-card">
                    <b>${labels[0]}</b>${res.condition}<br>
                    <b>${labels[1]}</b>${res.precaution}<br>
                    <b>${labels[2]}</b>${res.medication}<br>
                    <b>${labels[3]}</b>${res.doctor}
                </div>`
            };
        }

        /**
         * GEMINI AI API INTEGRATION
         */
        async function apiCall(prompt, sys = "Professional medical AI assistant.") {
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        contents: [{ parts: [{ text: prompt }] }],
                        systemInstruction: { parts: [{ text: sys }] }
                    })
                });
                const data = await response.json();
                return data.candidates?.[0]?.content?.parts?.[0]?.text || "Communication error.";
            } catch (e) { return "AI Service Unavailable."; }
        }

        let tempRemMed = "";
        function handleReminderFlow(val) {
            const t = i18n[currentLang];
            if (flowState === 'rem_name') {
                tempRemMed = val;
                flowState = 'rem_time';
                addMsg(t.promptRemTime, 'bot');
            } else if (flowState === 'rem_time') {
                const timeRegex = /^([0-1]?[0-9]|2[0-3]):[0-5][0-9]$/;
                if (timeRegex.test(val)) {
                    reminders.push({ med: tempRemMed, time: val, id: Date.now() });
                    addMsg(t.remSet.replace('{med}', tempRemMed).replace('{time}', val), 'bot');
                    // Request notification permission when setting a reminder
                    if ("Notification" in window && Notification.permission === "default") {
                        Notification.requestPermission();
                    }
                    setTimeout(showMenu, 3000);
                } else {
                    addMsg("Format: HH:MM (24h).", 'bot');
                }
            }
        }

        function checkReminders() {
            const now = new Date();
            const curTime = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
            reminders.forEach(r => {
                if (r.time === curTime && !r.notified) {
                    showNotification(`💊 Med Reminder: ${r.med}`);
                    // System-level notification for background alerts
                    if ("Notification" in window && Notification.permission === "granted") {
                        new Notification("Health Buddy Medication Alert", {
                            body: `It's time to take your ${r.med}.`,
                            icon: "https://cdn-icons-png.flaticon.com/512/3063/3063169.png"
                        });
                    }
                    r.notified = true;
                    setTimeout(() => r.notified = false, 61000);
                }
            });
        }

            else if (flowState.startsWith('rem_')) handleReminderFlow(val);
            else if (flowState.startsWith('vitals_')) handleVitalsFlow(val);
            else if (flowState === 'symptom_start') {
                let match = null;
                const keys = { 
                    'fever': 'fever', 'बुखार': 'fever', 'chest': 'chest pain', 'सीना': 'chest pain', 
                    'stomach': 'stomach', 'पेट': 'stomach', 'dizzy': 'dizziness', 'चक्कर': 'dizziness', 
                    'ear': 'earache', 'कान': 'earache', 'rash': 'rash', 'दाने': 'rash',
                    'nausea': 'nausea', 'मतली': 'nausea', 'tooth': 'toothache', 'दांत': 'toothache'
                };
                for (let k in keys) if (low.includes(k)) { match = keys[k]; break; }
                if (match) { currentSymptomData = symptomsEngine[match][currentLang] || symptomsEngine[match]['en']; followUpIndex = 0; askFollowUp(); }
                else { 
                    addMsg(t.aiChecking, 'bot');
                    const res = await apiCall(`Act as a medical AI. Describe: 1.Condition, 2.Precaution, 3.Medication, 4.Doctor Necessity for: ${val} in ${currentLang}`);
                    addMsg(res, 'bot'); setTimeout(showMenu, 7000);
                }
            }
            else if (flowState === 'medicine_search') {
                let foundKey = Object.keys(medicineDB).find(k => low.includes(k));
                if (foundKey) { addMsg(`💊 <b>${foundKey.toUpperCase()}</b><br>${medicineDB[foundKey][currentLang]}`, 'bot'); setTimeout(showMenu, 5000); }
                else { addMsg(t.medNotFound, 'bot'); const res = await apiCall(`Explain medicine ${val} in ${currentLang}`); addMsg(res, 'bot'); setTimeout(showMenu, 7000); }
            }
            else if (flowState === 'free_ask') { addMsg(t.aiChecking, 'bot'); const res = await apiCall(val); addMsg(res, 'bot'); setTimeout(showMenu, 7000); }
            else if (flowState === 'pincode') { const url = `https://www.google.com/maps/search/hospitals+near+${val}/`; addMsg(`<a href="${url}" target="_blank" class="text-teal-600 font-bold underline">📍 Maps: Hospitals near ${val}</a>`, 'bot'); setTimeout(showMenu, 4000); }

            else if (flowState === 'bmi_h') { const h = parseFloat(val)/100; const bmi = (userWeight/(h*h)).toFixed(1); addMsg(t.bmiResult.replace('{bmi}', bmi).replace('{category}', bmi < 18.5 ? "Underweight" : (bmi < 25 ? "Normal" : "Overweight")), 'bot'); setTimeout(showMenu, 5000); }
            else if (flowState === 'menu') handleMenu(val);
        }

        function askFollowUp() {
            const t = i18n[currentLang];
            const qObj = currentSymptomData.questions[followUpIndex];
            addMsg(`❓ ${qObj.q}`, 'bot');
            showButtons([t.btnYes, t.btnNo], (ans) => {
                collectedAnswers[qObj.key] = (ans === t.btnYes);
                followUpIndex++;
                if (followUpIndex < currentSymptomData.questions.length) askFollowUp();
                else {
                    const result = currentSymptomData.diagnose(collectedAnswers);
                    addMsg(`🧬 <b>Result:</b><br>${result.text}`, 'bot', result.triage);
                    addMsg(t.disclaimer, 'bot'); setTimeout(showMenu, 10000);
                }
            });
        }

        function showMenu() { flowState = 'menu'; showButtons(i18n[currentLang].menuOptions, handleMenu); }
        
        function handleMenu(choice) {
            const t = i18n[currentLang];
            const idx = t.menuOptions.indexOf(choice);
            if (idx === 0) { flowState = 'symptom_start'; addMsg(t.promptSymptom, 'bot'); }
            else if (idx === 1) { flowState = 'medicine_search'; addMsg(t.promptMedicine, 'bot'); }
            else if (idx === 2) { flowState = 'free_ask'; addMsg(t.promptAsk, 'bot'); }
            else if (idx === 3) { 
                flowState = 'self_care'; 
                addMsg(t.promptSelfCare, 'bot'); 
                showButtons(i18n[currentLang].selfCareOptions, (sel) => {
                    processInput(sel);
                });
            }
            else if (idx === 4) { flowState = 'pincode'; addMsg(t.promptPincode, 'bot'); }
            else if (idx === 5) { flowState = 'bmi_w'; addMsg(t.promptWeight, 'bot'); }
            else if (idx === 6) { listReminders(); }
            else if (idx === 7) { listVitals(); }
        }

        /**
         * MODAL & PROFILE UTILITIES
         */
        function openSettingsModal() { 
            document.getElementById('p-age').value = profile.age || "";
            document.getElementById('p-blood').value = profile.blood;
            document.getElementById('p-chronic').checked = profile.chronic;
            document.getElementById('p-allergies').value = profile.allergies;
            document.getElementById('settings-modal').classList.add('active'); 
        }
        function closeSettingsModal() { document.getElementById('settings-modal').classList.remove('active'); }
        function saveProfile() {
            profile.age = parseInt(document.getElementById('p-age').value) || 0;
            profile.blood = document.getElementById('p-blood').value;
            profile.chronic = document.getElementById('p-chronic').checked;
            profile.allergies = document.getElementById('p-allergies').value;
            addMsg("Profile Saved.", "bot"); closeSettingsModal();
        }

        function openSOSModal() {
            document.getElementById('sos-modal').classList.add('active');
            sosStartTime = Date.now();
            updateTimer();
        }
        function closeSOSModal() { document.getElementById('sos-modal').classList.remove('active'); }
        function updateTimer() {
            if (!document.getElementById('sos-modal').classList.contains('active')) return;
            const s = Math.floor((Date.now() - sosStartTime)/1000);
            document.getElementById('sos-timer').innerText = `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`;
            setTimeout(updateTimer, 1000);
        }

        function quickCall(n) { window.location.href = `tel:${n}`; }
        function sendEmergencySMS() {
            const msg = `🆘 SOS! Medical help required. Name: ${userName}. Age: ${profile.age}.`;
            window.location.href = `sms:?body=${encodeURIComponent(msg)}`;
        }

        function startVoice() {
            const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
            if(!SpeechRec) return;
            const rec = new SpeechRec();
            rec.lang = currentLang === 'hi' ? 'hi-IN' : 'en-US';
            rec.onresult = (e) => { userInput.value = e.results[0][0].transcript; sendMessage(); };
            rec.start();
        }

        function sendMessage() {
            const v = userInput.value.trim();
            if (!v) return;
            addMsg(v, 'user'); userInput.value = ''; processInput(v);
        }

        function changeLanguage(l) {
            currentLang = l;
            const t = i18n[l];
            document.getElementById('header-subtitle').innerText = t.headerSubtitle;
            document.getElementById('settings-title').innerText = t.settingsTitle;
            userInput.placeholder = l === 'en' ? "Describe symptoms..." : "लक्षण बताएं...";
            if (flowState === 'menu') showMenu();
        }

        
        window.onload = () => {
            addMsg("Choose Language / भाषा चुनें:", 'bot');
            showButtons(['English', 'हिंदी'], (c) => {
                currentLang = (c === 'English' ? 'en' : 'hi');
                changeLanguage(currentLang);
                flowState = 'naming';
                addMsg(i18n[currentLang].askName, 'bot');
            });
        };
        userInput.addEventListener("keypress", (e) => { if(e.key === "Enter") sendMessage(); });
    </script>
</body>
</html>
