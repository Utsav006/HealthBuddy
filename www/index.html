<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Buddy | Professional Emergency Triage AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* Base Styles and Resets */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #f0f2f5; color: #1e293b; }
        body { font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; }
        
        /* Chat UI Enhancements */
        .chat-bubble-user { 
            background: linear-gradient(135deg, #0d9488, #0f766e); 
            color: white; 
            align-self: flex-end; 
            border-bottom-right-radius: 4px; 
            border-bottom-left-radius: 18px; 
            border-top-left-radius: 18px; 
            border-top-right-radius: 18px; 
            box-shadow: 0 4px 12px rgba(13, 148, 136, 0.2);
        }
        .chat-bubble-bot { 
            background-color: #ffffff; 
            color: #1e293b; 
            align-self: flex-start; 
            border-bottom-right-radius: 18px; 
            border-bottom-left-radius: 4px; 
            border-top-left-radius: 18px; 
            border-top-right-radius: 18px; 
            border: 1px solid #e2e8f0; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }
        
        .menu-button {
            background-color: #ffffff; border: 1.5px solid #0d9488; color: #0d9488;
            padding: 0.7rem 1.4rem; margin: 0.35rem; border-radius: 9999px;
            cursor: pointer; font-size: 0.875rem; font-weight: 600; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex; align-items: center; gap: 0.5rem;
        }
        .menu-button:hover { background-color: #0d9488; color: #ffffff; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(13, 148, 136, 0.25); }
        .menu-button:active { transform: scale(0.95); }

        /* SOS and Fixed UI Elements */
        .sos-btn {
            position: fixed; top: 1.25rem; right: 1.25rem; z-index: 50;
            width: 60px; height: 60px; border-radius: 50%;
            background: linear-gradient(135deg, #dc2626, #991b1b);
            color: white; border: none; cursor: pointer; font-weight: 800;
            box-shadow: 0 10px 25px rgba(220, 38, 38, 0.5);
            animation: pulse-sos 2s infinite;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.8rem;
        }
        @keyframes pulse-sos {
            0% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.7); transform: scale(1); }
            70% { box-shadow: 0 0 0 18px rgba(220, 38, 38, 0); transform: scale(1.05); }
            100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); transform: scale(1); }
        }

        /* Modal Styles */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.8); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(8px);
            padding: 1rem;
        }
        .modal.active { display: flex; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .modal-content {
            background: white; border-radius: 28px; padding: 2.5rem; width: 100%; max-width: 480px;
            max-height: 90vh; overflow-y: auto; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
        }
        
        #chat-area::-webkit-scrollbar { width: 5px; }
        #chat-area::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        /* Badges and Typography */
        .triage-badge { padding: 4px 10px; border-radius: 6px; font-weight: 800; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; display: inline-block; }
        .triage-red { background: #fee2e2; color: #b91c1c; border: 1px solid #f87171; }
        .triage-yellow { background: #fef9c3; color: #a16207; border: 1px solid #facc15; }
        .triage-green { background: #dcfce7; color: #15803d; border: 1px solid #4ade80; }

        .ai-typing::after {
            content: "•";
            animation: typing-dots 1s infinite;
        }
        @keyframes typing-dots { 
            0%, 100% { opacity: 0; } 
            50% { opacity: 1; } 
        }

        .assessment-card {
            border-left: 4px solid #0d9488;
            padding-left: 1rem;
            margin: 0.5rem 0;
        }
    </style>
</head>
<body>

    <!-- Chat Container -->

        <main id="chat-area" style="flex: 1; padding: 1.5rem; overflow-y: auto; display: flex; flex-direction: column; gap: 1.25rem; background: #f8fafc;"></main>

    <!-- SOS Modal -->

        <div class="modal-content text-center">

        </div>

    <!-- Profile Settings Modal -->

                <div class="grid grid-cols-2 gap-4">

                    </div>
                    <div>

                </div>
                <div class="pt-4 flex flex-col gap-3">

                    <button onclick="closeSettingsModal()" class="w-full text-slate-400 font-bold py-2">Close</button>
                </div>
            </div>
        </div>
    </div>

        /**
         * CORE APP LOGIC
         */
        function calculateEmergencyIndex(symptomKey, answers) {
            let score = 0;
            const patientAge = profile.age || 30;
            const isChronic = profile.chronic;

            const baseWeights = { 
                'high_fever': 7, 'stiffness': 10, 'rash_severe': 9,
                'cardiac_spread': 10, 'sweating': 8, 'appendix': 9, 'blood': 8,
                'thunderclap': 10, 'stroke': 10, 'breath': 9, 'control': 10
            };

            for(let key in answers) if(answers[key] && baseWeights[key]) score += baseWeights[key];
            if (patientAge < 5 || patientAge > 65) score += 5;
            if (isChronic) score += 6;

            if (score >= 12) return { level: 'EMERGENCY', color: 'triage-red' };
            if (score >= 7) return { level: 'HIGH', color: 'triage-yellow' };
            return { level: 'STABLE', color: 'triage-green' };
        }

        function formatAssessment(res, triage) {
            const l = currentLang;
            const labels = {
                en: ["1. Condition: ", "2. Precaution: ", "3. Medication: ", "4. Doctor Necessity: "],
                hi: ["1. स्थिति (Condition): ", "2. सावधानी (Precaution): ", "3. दवा (Medication): ", "4. डॉक्टर की सलाह: "]
            };
            const b = labels[l];
            return {
                triage: triage,
                text: `<div class="assessment-card">
                    <b>${b[0]}</b>${res.condition}<br>
                    <b>${b[1]}</b>${res.precaution}<br>
                    <b>${b[2]}</b>${res.medication}<br>
                    <b>${b[3]}</b>${res.doctor}
                </div>`
            };
        }

        const chatArea = document.getElementById('chat-area');
        const userInput = document.getElementById('user-input');

        function addMsg(text, type, triageObj = null) {
            const div = document.createElement('div');
            div.className = `p-4 shadow-sm text-[0.92rem] leading-relaxed transition-all animate-in fade-in slide-in-from-bottom-2 duration-300 ${type === 'user' ? 'chat-bubble-user ml-auto' : 'chat-bubble-bot mr-auto'}`;
            
            let triageHtml = "";
            if (triageObj) {
                const label = i18n[currentLang][`triage${triageObj.level === 'EMERGENCY' ? 'Emergency' : (triageObj.level === 'HIGH' ? 'High' : 'Stable')}`];
                triageHtml = `<div class="mb-2"><span class="triage-badge ${triageObj.color}">${label}</span></div>`;
            }

            let chronicTag = (type === 'bot' && profile.chronic && triageObj) ? `<div class="mt-3 text-xs text-red-600 font-bold border-t border-slate-100 pt-2 flex items-center gap-1">⚠️ ${i18n[currentLang].chronicWarning}</div>` : "";

            div.innerHTML = `${triageHtml}${text}${chronicTag}`;
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function showButtons(options, callback) {
            const wrap = document.createElement('div');
            wrap.className = 'flex flex-wrap gap-2 my-2 animate-in fade-in slide-in-from-bottom-1 duration-500';
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'menu-button';
                btn.innerText = opt;
                btn.onclick = () => {
                    addMsg(opt, 'user');
                    wrap.remove();
                    callback(opt);
                };
                wrap.appendChild(btn);
            });
            chatArea.appendChild(wrap);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        async function apiCall(prompt, systemInstruction = "You are a concise medical assistant.") {
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        contents: [{ parts: [{ text: prompt }] }],
                        systemInstruction: { parts: [{ text: systemInstruction }] }
                    })
                });
                const data = await response.json();
                return data.candidates?.[0]?.content?.parts?.[0]?.text || "Communication error.";
            } catch (e) {
                return "AI connection lost. Please check internet.";
            }
        }

        async function processInput(val) {
            const t = i18n[currentLang];
            const low = val.toLowerCase();

            if (flowState === 'naming') {
                userName = val;
                flowState = 'menu';
                addMsg(t.menuGreeting.replace('{name}', userName), 'bot');
                showMenu();
            } 
            else if (flowState === 'symptom_start') {
                let match = null;
                const keywordMap = {
                    'fever': 'fever', 'बुखार': 'fever', 'chest': 'chest pain', 'सीना': 'chest pain', 
                    'stomach': 'stomach', 'पेट': 'stomach', 'cough': 'cough', 'खांसी': 'cough',
                    'head': 'headache', 'सिर': 'headache', 'back': 'back pain', 'कमर': 'back pain'
                };

                for (let key in keywordMap) if (low.includes(key)) { match = keywordMap[key]; break; }

                if (match) {
                    currentSymptomData = symptomsEngine[match][currentLang];
                    followUpIndex = 0;
                    collectedAnswers = {};
                    askFollowUp();
                } else {
                    addMsg(t.aiChecking, 'bot');
                    const res = await apiCall(`Act as a medical triage AI. The patient says: "${val}". Provide an assessment in ${currentLang === 'hi' ? 'Hindi' : 'English'}. Include: 1. Condition, 2. Precaution, 3. Medication, 4. Doctor Necessity.`);
                    addMsg(res, 'bot');
                    setTimeout(showMenu, 7000);
                }
            }
            else if (flowState === 'medicine_search') {
                let foundKey = Object.keys(medicineDB).find(k => low.includes(k));
                if (foundKey) {
                    addMsg(`💊 <b>${foundKey.toUpperCase()}</b><br><br>${medicineDB[foundKey][currentLang]}`, 'bot');
                    setTimeout(showMenu, 5000);
                } else {
                    addMsg(t.medNotFound, 'bot');
                    const res = await apiCall(`Explain uses, side effects, and warnings for ${val} in ${currentLang === 'hi' ? 'Hindi' : 'English'}.`);
                    addMsg(res, 'bot');
                    setTimeout(showMenu, 7000);
                }
            }
            else if (flowState === 'free_ask') {
                addMsg(t.aiChecking, 'bot');
                const res = await apiCall(val, `Respond in ${currentLang === 'hi' ? 'Hindi' : 'English'}. Be helpful and professional.`);
                addMsg(res, 'bot');
                setTimeout(showMenu, 7000);
            }
            else if (flowState === 'pincode') {
                const url = `https://www.google.com/maps/search/hospitals+near+${val}/`;
                addMsg(`<a href="${url}" target="_blank" class="text-teal-600 font-bold underline">📍 View Hospitals near ${val}</a>`, 'bot');
                setTimeout(showMenu, 4000);
            }
            else if (flowState === 'bmi_w') {
                userWeight = parseFloat(val);
                flowState = 'bmi_h';
                addMsg(t.promptHeight, 'bot');
            }
            else if (flowState === 'bmi_h') {
                const h = parseFloat(val) / 100;
                const bmi = (userWeight / (h*h)).toFixed(1);
                const cat = bmi < 18.5 ? "Underweight" : (bmi < 25 ? "Normal" : "Overweight");
                addMsg(t.bmiResult.replace('{bmi}', bmi).replace('{category}', cat), 'bot');
                setTimeout(showMenu, 5000);
            }
            else if (flowState === 'menu') {
                handleMenu(val);
            }
        }

        function askFollowUp() {
            const t = i18n[currentLang];
            const qObj = currentSymptomData.questions[followUpIndex];
            addMsg(`❓ ${qObj.q}`, 'bot');
            showButtons([t.btnYes, t.btnNo], (ans) => {
                collectedAnswers[qObj.key] = (ans === t.btnYes);
                followUpIndex++;
                if (followUpIndex < currentSymptomData.questions.length) {
                    askFollowUp();
                } else {
                    const result = currentSymptomData.diagnose(collectedAnswers);
                    addMsg(`🧬 <b>${t.assessmentTitle}:</b><br>${result.text}`, 'bot', result.triage);
                    addMsg(t.disclaimer, 'bot');
                    setTimeout(showMenu, 10000);
                }
            });
        }

        function showMenu() {
            flowState = 'menu';
            showButtons(i18n[currentLang].menuOptions, handleMenu);
        }

        function handleMenu(choice) {
            const t = i18n[currentLang];
            const idx = t.menuOptions.indexOf(choice);
            if (idx === 0) { flowState = 'symptom_start'; addMsg(t.promptSymptom, 'bot'); }
            else if (idx === 1) { flowState = 'medicine_search'; addMsg(t.promptMedicine, 'bot'); }
            else if (idx === 2) { flowState = 'free_ask'; addMsg(t.promptAsk, 'bot'); }
            else if (idx === 3) { 
                flowState = 'self_care'; 
                addMsg(t.promptSelfCare, 'bot'); 
                showButtons(t.selfCareOptions, (sel) => {
                    const low = sel.toLowerCase();
                    if(selfCareDB[low]) {
                        addMsg(`🌿 <b>${sel}:</b><br><br>${selfCareDB[low][currentLang]}`, 'bot');
                        setTimeout(showMenu, 8000);
                    }
                });
            }
            else if (idx === 4) { 
                flowState = 'pincode'; 
                addMsg(t.promptPincode, 'bot'); 
                showButtons([t.btnGPS], (btn) => { if(btn === t.btnGPS) detectHospitals(); });
            }
            else if (idx === 5) { flowState = 'bmi_w'; addMsg(t.promptWeight, 'bot'); }
        }

        function detectHospitals() {
            navigator.geolocation.getCurrentPosition(
                (p) => {
                    const url = `https://www.google.com/maps/search/hospitals+near+${p.coords.latitude},${p.coords.longitude}/`;
                    addMsg(`<a href="${url}" target="_blank" class="text-teal-600 font-bold underline">📍 Nearest Hospitals (GPS)</a>`, 'bot');
                    setTimeout(showMenu, 5000);
                },
                () => addMsg(i18n[currentLang].locManualPrompt, 'bot')
            );
        }

        /**
         * PROFILE & SOS MODALS
         */
        function openSettingsModal() { 
            document.getElementById('p-age').value = profile.age || "";
            document.getElementById('p-blood').value = profile.blood;
            document.getElementById('p-chronic').checked = profile.chronic;
            document.getElementById('p-allergies').value = profile.allergies;
            document.getElementById('settings-modal').classList.add('active'); 
        }
        function closeSettingsModal() { document.getElementById('settings-modal').classList.remove('active'); }
        function saveProfile() {
            profile.age = parseInt(document.getElementById('p-age').value) || 0;
            profile.blood = document.getElementById('p-blood').value;
            profile.chronic = document.getElementById('p-chronic').checked;
            profile.allergies = document.getElementById('p-allergies').value;
            addMsg(currentLang === 'en' ? "Profile Updated." : "प्रोफ़ाइल अपडेट की गई।", "bot");
            closeSettingsModal();
        }

        function openSOSModal() {
            document.getElementById('sos-modal').classList.add('active');
            sosStartTime = Date.now();
            updateTimer();
            navigator.geolocation.getCurrentPosition(
                (p) => document.getElementById('sos-status').innerText = `Location: ${p.coords.latitude.toFixed(4)}, ${p.coords.longitude.toFixed(4)}`,
                () => document.getElementById('sos-status').innerText = "Location access denied."
            );
        }
        function closeSOSModal() { document.getElementById('sos-modal').classList.remove('active'); }
        function updateTimer() {
            if (!document.getElementById('sos-modal').classList.contains('active')) return;
            const s = Math.floor((Date.now() - sosStartTime)/1000);
            document.getElementById('sos-timer').innerText = `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`;
            setTimeout(updateTimer, 1000);
        }

        function quickCall(n) { window.location.href = `tel:${n}`; }
        function sendEmergencySMS() {
            const loc = document.getElementById('sos-status').innerText;
            const msg = `🆘 SOS! Urgent medical help needed. ${loc}. Name: ${userName}. Age: ${profile.age}.`;
            window.location.href = `sms:?body=${encodeURIComponent(msg)}`;
        }

        /**
         * INITIALIZATION
         */
        function startVoice() {
            const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
            if(!SpeechRec) return;
            const rec = new SpeechRec();
            rec.lang = currentLang === 'hi' ? 'hi-IN' : 'en-US';
            rec.onresult = (e) => { userInput.value = e.results[0][0].transcript; sendMessage(); };
            rec.start();
        }

        function sendMessage() {
            const v = userInput.value.trim();
            if (!v) return;
            addMsg(v, 'user');
            userInput.value = '';
            processInput(v);
        }

        function changeLanguage(l) {
            currentLang = l;
            const t = i18n[l];
            document.getElementById('header-subtitle').innerText = t.headerSubtitle;
            document.getElementById('settings-title').innerText = t.settingsTitle;
            document.getElementById('btn-save-settings').innerText = t.btnSave;
            userInput.placeholder = l === 'en' ? "Describe symptoms..." : "लक्षणों का वर्णन करें...";
            if (flowState === 'menu') showMenu();
        }

        window.onload = () => {
            addMsg("Select Language / भाषा चुनें:", 'bot');
            showButtons(['English', 'हिंदी'], (c) => {
                currentLang = (c === 'English' ? 'en' : 'hi');
                changeLanguage(currentLang);
                flowState = 'naming';
                addMsg(i18n[currentLang].askName, 'bot');
            });
        };
        userInput.addEventListener("keypress", (e) => { if(e.key === "Enter") sendMessage(); });
    </script>
